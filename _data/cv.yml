    Research Profile:
      - name: AI-enabled architectural programming
        summary: Developed a coherent research program around architectural programming as the front-end decision system of complex public projects.
        highlights:
          - Architectural programming and briefing for complex public projects.
          - AI-enabled decision-making, collective intelligence, and multi-agent reinforcement learning.
          - Megaproject governance, complexity, risk, stakeholder coordination, and public concerns.

      - name: Computational methods for design and project governance
        summary: Combines computational social science, decision science, and design research methods for early-stage public project planning.
        highlights:
          - Text mining, topic modeling, sentiment analysis, bibliometrics, and systematic review.
          - Social network analysis, entropy weight, fuzzy TOPSIS, grey relational analysis, and Monte Carlo simulation.
          - Deep learning and computer vision for child-friendly urban street evaluation.

